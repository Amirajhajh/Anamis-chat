<!DOCTYPE html>
{% load static %}
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>ANAMIS</h1>
            <p>لطفاً برای ادامه وارد حساب کاربری خود بشید</p>
        </div>

        <form method="post" action="{% url 'login' %}" class="login-form">
            {% csrf_token %}

            <div class="input-group">
                <label for="username">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    نام کاربری
                </label>
                <input type="text" id="username" name="username" placeholder="مثلاً: ali_reza" required>
            </div>

            <div class="input-group">
                <label for="password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    رمز عبور
                </label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            {% if form.errors %}
                <div class="error-message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span>نام کاربری یا رمز عبور اشتباه است.</span>
                </div>
            {% endif %}

            <button type="submit" class="login-btn">
                <span>ورود به حساب</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>

        <div class="login-footer">
            <!-- اصلاح خط ۵۲ -->
<p>حساب کاربری ندارید؟ <a href="{% url 'register_step1' %}">ثبت نام کنید</a></p>

        </div>
        <div>
            <div class="login-footer">
    <a href="{% url 'password_reset' %}">رمز عبور خود را فراموش کرده‌اید؟</a>
</div>
        </div>
    </div>
</div>

</body>
</html>
