    <!-- templates/chat/start_chat.html -->
    {% extends 'base.html' %} {# فرض می‌کنیم یک base.html دارید #}

    {% block title %}شروع چت جدید{% endblock %}

    {% block content %}

<style>
    /* تنظیمات کلی برای وسط‌چین کردن کل محتوا */
    body {
        font-family: 'Tahoma', 'Segoe UI', sans-serif; /* فونت خوانا */
        background-color: #f4f4f9; /* رنگ پس‌زمینه ملایم */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* ارتفاع کل صفحه */
        margin: 0;
    }

    /* استایل کادر اصلی (کانتینر) */
    .chat-box {
        background-color: #ffffff;
        padding: 30px;
        border-radius: 12px; /* گوشه‌های گرد */
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); /* سایه نرم */
        width: 100%;
        max-width: 400px; /* حداکثر عرض کادر */
        text-align: center;
    }

    /* استایل عنوان */
    .chat-box h1 {
        margin-top: 0;
        color: #333;
        font-size: 24px;
        margin-bottom: 20px;
    }

    /* استایل پیام خطا */
    .chat-box p.error {
        color: #e74c3c;
        background-color: #fadbd8;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
    }

    /* استایل لیبل و اینپوت */
    .chat-box label {
        display: block;
        text-align: right;
        margin-bottom: 8px;
        color: #555;
        font-weight: bold;
    }

    .chat-box input[type="text"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box; /* برای محاسبه صحیح پدینگ */
        font-size: 16px;
        transition: border-color 0.3s;
    }

    .chat-box input[type="text"]:focus {
        border-color: #3498db;
        outline: none;
    }

    /* استایل دکمه */
    .chat-box button {
        width: 100%;
        padding: 12px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .chat-box button:hover {
        background-color: #2980b9;
    }
</style>


<div class="chat-box">
    <h1>شروع چت جدید</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        <label for="username">نام کاربری مخاطب:</label>
        <input type="text" id="username" name="username" required>
        
        <button type="submit">شروع چت</button>
    </form>
</div>


    {% endblock %}
